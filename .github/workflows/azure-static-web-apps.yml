name: Deploy frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/azure-static-web-apps.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    env:
      # Public (NEXT_PUBLIC_*) build-time values. The Supabase anon key is
      # designed to be exposed to the browser; the API URL is public too.
      NEXT_PUBLIC_API_BASE_URL: https://mrmrscuts-api.azurewebsites.net/api
      NEXT_PUBLIC_SUPABASE_URL: https://ejfusrjqqhlorshtolee.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqZnVzcmpxcWhsb3JzaHRvbGVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NTI4MTksImV4cCI6MjA5NTEyODgxOX0.Ox6wP3ap0MRUhzLEwdtUy6XHf_B0EcEwNbMbU9lI2PE
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # Cache and restore node_modules via the lockfile so installs are not
      # re-downloaded from scratch on every run.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      # With skip_app_build, Oryx does NOT strip dev dependencies (it normally
      # would). Prune them here so the uploaded package stays small; sharp is a
      # production dependency and is kept for Next.js image optimization.
      - name: Prune dev dependencies
        working-directory: frontend
        run: npm prune --omit=dev

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "frontend"
          api_location: ""
          output_location: ""
          # We already ran `npm ci && npm run build` above (with caching), so
          # tell the deploy engine to skip its own from-scratch install+build.
          skip_app_build: true
          skip_api_build: true

